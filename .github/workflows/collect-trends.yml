name: Collect Trends

on:
  schedule:
    - cron: '0 0 * * *'     # 매일 자정(UTC) 자동 실행
  workflow_dispatch:          # GitHub에서 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trends collection
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/trends/collect" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            && echo "✅ 수집 성공" || echo "❌ 수집 실패"
